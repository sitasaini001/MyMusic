<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="home">
            <ul>
                <li><img width="65px" class="invert" src="logo.svg" alt="MyMusic logo"></li>
                <li><img id="home" width="30px" class="invert" src="home.svg" alt="home logo"></li>
                <li><img width="30px" class="invert" src="search.svg" alt="search"></li>
                 <img class="invert hamburger" src="hamburger.svg">
            </ul>
        </div>
     
        <div class="rightyy">

            <a id="yes" href="">Premium</a>
            <a id="yes" href="">Support</a>
            <a id="yes" href="">Download &nbsp;&nbsp;&nbsp;</a>|
            <a id="yes" href="">Install App</a>
            <a href="">Sign up</a>
            <button id="button">Log in</button>
        </div>

    </nav>

    <div class="container flex">
        <div class="left border">
            <img right="0" , width="30px" class="invert close" src="close.svg">

            <h4><img class="invert" ,width="35px" src="library.svg">&nbsp;&nbsp;Your Library</h4>        


            <div class="songList">

                <ul>

                </ul>
            </div>


            <div class="footer">
                <a href="https://www.spotify.com/in-en/legal/">Legal</a>
                <a href="https://www.spotify.com/in-en/safetyandprivacy/">Safety & Privacy Center</a>
                <a href="https://www.spotify.com/in-en/legal/privacy-policy/">Privacy Policy</a>
                <br><br>
                <a href="https://www.spotify.com/in-en/legal/cookies-policy/">Cookies</a>
                <a href="https://www.spotify.com/in-en/legal/privacy-policy/#s3">About Ads</a>
                <a href="https://www.spotify.com/in-en/accessibility/">Accessibility</a>
            </div>
        </div>
        <div class="right border">

            
            <h2>Trending Songs</h2>
            <div class="cardContainer">
                

            </div>
            <div class="playbar">
                <div class="seekbar">

                    <div class="circle">
                        5
                    </div>
                </div>

                <div class="songinfo"></div>
                <div class="songbuttons">
                    <img id="previous" src="previous.svg" alt="">
                    <img id="play" src="play.svg" alt="">
                    <img id="next" src="next.svg" alt="">
                </div>
                                                                                              
                <div class="timevol">
                    <div class="songtime">

                    </div>

                    <div class="volume">
                        <img class="invert" width="25px" src="volume.svg" alt="">
                        <div class="range">
                            <input type="range" name="volume" id="">
                        </div>
                    </div>
                </div>
            </div>

            <div class="artistSide">
                <h2>Popular Artist</h2>
                <div class="artistContainer">
                    <div class="artist">
                        <img>
                        <h3>Pritam</h3>
                        <p>Artist</p>
                    </div>

                    <div class="artist">
                        <img>
                        <h3>A.R.Rahman</h3>
                        <p>Artist</p>
                    </div>
                    <div class="artist">
                        <img>
                        <h3>Arijit Singh</h3>
                        <p>Artist</p>
                    </div>
                    <div class="artist">
                        <img>
                        <h3>Sachin-Jigar</h3>
                        <p>Artist</p>
                    </div>
                    <div class="artist">
                        <img>
                        <h3>Vishal-Shekhar</h3>
                        <p>Artist</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>


</body>

</html>
